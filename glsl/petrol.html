#define PI  3.14159265359
#define TAU 6.28318530718

float hash(vec2 p) {
	return fract(1e4 * sin(117.0 * p.x + p.y * 0.1) * (0.1 + abs(sin(p.y * 133.0 + p.x))));
} 

float noise(vec2 x) {
	vec2 i = floor(x);
	vec2 f = fract(x);
	// Four corners in 2D of a tile
	float a = hash(i);
	float b = hash(i + vec2(1.0, 0.0));
	float c = hash(i + vec2(0.0, 1.0));
	float d = hash(i + vec2(1.0, 1.0));

	vec2 u = f * f * (3.0 - 2.0 * f);
	return mix(a, b, u.x) + (c - a) * u.y * (1.0 - u.x) + (d - b) * u.x * u.y;
}


vec3 lines(vec2 p)
{
	float n2 = 5., n3 = 2., n = 4., t = 0.; 

    vec3 col0 = vec3(1., 0.5, 0.5), col1 = vec3(0.5, 1., 0.5), col2 = vec3(0.5, 0.5, 1.),
	col3 = vec3(1., 1., 0.5), col4 = vec3(1., 0.5, 1.), col5 = vec3(0.5, 1., 1.),
	colline = vec3(0.);
	mat2 rot = mat2(cos(0.5), sin(0.5), -sin(0.5), cos(0.50));
    p.x += iTime*0.2;
    
	vec2 x = p, shift = vec2(0.1, 0.2);
	
    x = rot*x + shift;
	t += 1.8*noise(x*n3);
	
    x = rot*x + shift;
	t += 0.2*noise(x*n2);
    
	p.y += t;
	p.y *= n;
	
	vec3 col = col0;
	float ncol = mod(floor(p.y), 6.);
	if (ncol == 1.)
		col = col1;
	if (ncol == 2.)		
		col = col2;
	if (ncol == 3.)		
		col = col3;
	if (ncol == 4.)		
		col = col4;
	if (ncol == 5.)		
		col = col5;			
	
	float y = fract(p.y), h = 0.06, eps = 15./iResolution.y, s1 = smoothstep(1. - h - eps, 1.-h, y),	
	s2 = smoothstep(h, h-eps, y);
	col = mix(col, colline, s1);
	col = mix(col, colline, s2);
	return col;	
}


void mainImage(out vec4 fragColor, in vec2 fragCoord) {
    //vec2 p = vec2(fragCoord.x/iResolution.x, fragCoord.y/iResolution.y); //(-iResolution.xy + 2.0 * fragCoord) / iResolution.y;

(function (global) {
    'use strict';

    const root = global.ShaderToy = global.ShaderToy || {};
    const SELF_SOURCE_ID = Number(root.SELF_SOURCE_ID);

    if (!root.shaderCompile) {
        root.shaderCompile = {};
    }

    // Central place for any #line / sentinel normalization.
    root.shaderCompile.normalizeLineDirectives = function (source) {
        if (!Number.isFinite(SELF_SOURCE_ID)) {
            console.warn('ShaderToy: SELF_SOURCE_ID is not set; skipping #line normalization');
            return source || '';
        }

        // Normalize our "self" sentinel source-id for compiles.
        return (source || '').replace(new RegExp(`#line\\s+(\\d+)\\s+${SELF_SOURCE_ID}`, 'g'), '#line $1 0');
    };

    root.shaderCompile.prepareFragmentShader = function (source, glslUseVersion3) {
        if (glslUseVersion3) {
            return (
                '#ifdef gl_FragColor\n' +
                '#define GLSL_FRAGCOLOR gl_FragColor\n' +
                '#else\n' +
                'layout(location = 0) out highp vec4 layoutFragColor;\n' +
                '#define gl_FragColor layoutFragColor\n' +
                '#define GLSL_FRAGCOLOR layoutFragColor\n' +
                '#endif\n' +
                '#define texture2D texture\n' +
                '#define textureCube texture\n' +
                '\n' + (source || '')
            );
        }
        return (
            '#define GLSL_FRAGCOLOR gl_FragColor\n' +
            '\n' + (source || '')
        );
    };

    root.shaderCompile.prepareVertexShader = function (source, glslUseVersion3) {
        if (!glslUseVersion3) {
            throw new Error('Custom vertex shaders (#iVertex) require shader-toy.webglVersion = "WebGL2".');
        }

        return (
            '#define texture2D texture\n' +
            '#define textureCube texture\n' +
            '\n' + (source || '')
        );
    };

    const getCompileHeader = (glslUseVersion3) => {
        // Keep header line count stable (2 lines) for easier line-offset mapping.
        return glslUseVersion3
            ? '#version 300 es\nprecision highp float;\n'
            : '// shader-toy\nprecision highp float;\n';
    };

    root.shaderCompile.compileFragShader = function (gl, fsSource) {
        const fs = gl.createShader(gl.FRAGMENT_SHADER);
        const normalized = root.shaderCompile.normalizeLineDirectives(fsSource);
        gl.shaderSource(fs, normalized);
        gl.compileShader(fs);
        if (!gl.getShaderParameter(fs, gl.COMPILE_STATUS)) {
            const fragmentLog = gl.getShaderInfoLog(fs);
            console.error('THREE.WebGLProgram: shader error: ', gl.getError(), 'gl.COMPILE_STATUS', null, null, null, null, fragmentLog);
            return false;
        }
        return true;
    };

    root.shaderCompile.compileIncludeFragment = function (gl, fsSource, glslUseVersion3) {
        const fs = gl.createShader(gl.FRAGMENT_SHADER);
        const normalized = root.shaderCompile.normalizeLineDirectives(fsSource);
        const header = getCompileHeader(glslUseVersion3);
        const wrapped = `${header}${normalized || ''}\nvoid main() {}\n`;
        gl.shaderSource(fs, wrapped);
        gl.compileShader(fs);
        if (!gl.getShaderParameter(fs, gl.COMPILE_STATUS)) {
            const fragmentLog = gl.getShaderInfoLog(fs);
            console.error('THREE.WebGLProgram: shader error: ', gl.getError(), 'gl.COMPILE_STATUS', null, null, null, null, fragmentLog);
            return false;
        }
        return true;
    };

    root.shaderCompile.compileVertexShader = function (gl, vsSource, glslUseVersion3) {
        const vs = gl.createShader(gl.VERTEX_SHADER);
        const normalized = root.shaderCompile.normalizeLineDirectives(vsSource);

        Shader: new THREE.ShaderMaterial({
            glslVersion: glslUseVersion3 ? THREE.GLSL3 : THREE.GLSL1,
            vertexShader: undefined,
            fragmentShader: prepareFragmentShader(document.getElementById("d:/Projects/JS/shaderty/glsl/petrol.glsl").textContent),
            depthWrite: false,
            depthTest: false,
            uniforms: {
                iResolution: { type: 'v3', value: resolution },
                iTime: { type: 'f', value: 0.0 },
                iTimeDelta: { type: 'f', value: 0.0 },
                iFrame: { type: 'i', value: 0 },
                iMouse: { type: 'v4', value: mouse },
                iMouseButton: { type: 'v2', value: mouseButton },
                iViewMatrix: {type: 'm44', value: new THREE.Matrix4() },
                iChannelResolution: { type: 'v3v', value: Array(10).fill(new THREE.Vector3(0,0,0)) },
    
                iDate: { type: 'v4', value: date },
                iSampleRate: { type: 'f', value: audioContext.sampleRate },
    
                iChannel0: { type: 't' },
                iChannel1: { type: 't' },
                iChannel2: { type: 't' },
                iChannel3: { type: 't' },
                iChannel4: { type: 't' },
                iChannel5: { type: 't' },
                iChannel6: { type: 't' },
                iChannel7: { type: 't' },
                iChannel8: { type: 't' },
                iChannel9: { type: 't' },
    
                resolution: { type: 'v2', value: resolution },
                time: { type: 'f', value: 0.0 },
                mouse: { type: 'v2', value: normalizedMouse },
            }
        })
    });
    let commonIncludes = [];
    // Includes
    

    // WebGL2 inserts more lines into the shader
    if (isWebGL2) {
        for (let buffer of buffers) {
            buffer.LineOffset += WEBGL2_EXTRA_SHADER_LINES;
            if (buffer.VertexLineOffset !== undefined) {
                buffer.VertexLineOffset += WEBGL2_EXTRA_SHADER_LINES;
            }
        }
    }

    // Keyboard Init
    
    // Uniforms Init
    // Uniforms Update

    let texLoader = new THREE.TextureLoader();
    // Texture Init
    

    let scene = new THREE.Scene();
    let quad = new THREE.Mesh(
        new THREE.PlaneGeometry(resolution.x, resolution.y),
        null
    );
    scene.add(quad);

    let controlState = new THREE.Camera();
    controlState.position.set(0,0,0);
    controlState.quaternion.set(0,0,0,1);
    scene.add(controlState);

    let flyControls = undefined;
    if (typeof FlyControls === 'function') {
        flyControls = new FlyControls(controlState, renderer.domElement, vscode);
        flyControls.movementSpeed = 1;
        flyControls.domElement = renderer.domElement;
        flyControls.rollSpeed = Math.PI / 24;
        flyControls.autoForward = false;
        flyControls.dragToLook = true;
    }

    let camera = new THREE.OrthographicCamera(-resolution.x / 2.0, resolution.x / 2.0, resolution.y / 2.0, -resolution.y / 2.0, 1, 1000);
    camera.position.set(0, 0, 10);

    // Run every shader once to check for compile errors
    let compileTimeStart = performance.now();
    let failed=0;
    const failedBufferNames = new Set();
    for (let include of commonIncludes) {
        currentShader = {
            Name: include.Name,
            File: include.File,
            // add for wrapper lines inserted by compileFragShader
            LineOffset: 27 + 2 + (isWebGL2 ? WEBGL2_EXTRA_SHADER_LINES : 0)
        };
        // Test Compile Included Files
        // bail if there is an error found in the include script
        if(compileFragShader(gl, document.getElementById(include.Name).textContent) == false) {
            throw Error(`Failed to compile ${include.Name}`);
        }
    }

    for (let buffer of buffers) {
        if (buffer.VertexShaderElementId !== undefined) {
            currentShader = {
                Name: buffer.Name + ' (vertex)',
                File: buffer.VertexFile,
                LineOffset: buffer.VertexLineOffset
            };

            const vertexSource = prepareVertexShader(document.getElementById(buffer.VertexShaderElementId).textContent);
            if (!compileVertShader(gl, vertexSource)) {
                failed++;
                failedBufferNames.add(buffer.Name);
                continue;
            }
        }
        currentShader = {
            Name: buffer.Name,
            File: buffer.File,
            LineOffset: buffer.LineOffset
        };
        quad.material = buffer.Shader;
        renderer.setRenderTarget(buffer.Target);
        renderer.render(scene, camera);
    }
    currentShader = {};
    let compileTimeEnd = performance.now();
    let compileTime = compileTimeEnd - compileTimeStart;
    if (compileTimePanel !== undefined) {
        for (let i = 0; i < 200; i++) {
            compileTimePanel.update(compileTime, 200);
        }
    }

    computeSize();
    render();

    function addLineNumbers( string ) {
        let lines = string.split( '\\n' );
        for ( let i = 0; i < lines.length; i ++ ) {
            lines[ i ] = ( i + 1 ) + ': ' + lines[ i ];
        }
        return lines.join( '\\n' );
    }

    function compileFragShader(gl, fsSource) {
        if (window.ShaderToy && window.ShaderToy.shaderCompile && window.ShaderToy.shaderCompile.compileIncludeFragment) {
            return window.ShaderToy.shaderCompile.compileIncludeFragment(gl, fsSource, glslUseVersion3);
        }
        return false;
    }

    function compileVertShader(gl, vsSource) {
        if (window.ShaderToy && window.ShaderToy.shaderCompile && window.ShaderToy.shaderCompile.compileVertexShader) {
            return window.ShaderToy.shaderCompile.compileVertexShader(gl, vsSource, glslUseVersion3);
        }
        return false;
    }

    function render() {
        requestAnimationFrame(render);
        if (!forceRenderOneFrame) {
            // Pause Whole Render
            if (paused) return;
        }
        forceRenderOneFrame = false;

        // Advance Time
        deltaTime = clock.getDelta();
        time = startingTime + clock.getElapsedTime() - pausedTime;
        if (vscode !== undefined) {
            vscode.postMessage({
                command: 'updateTime',
                time: time
            });
        }
        updateDate();
        
        if(flyControls)
        {
            flyControls.update(0.1);
        }

        // Audio Update

        for (let buffer of buffers) {
            if (failedBufferNames.has(buffer.Name)) {
                continue;
            }
            buffer.Shader.uniforms['iResolution'].value = resolution;
            buffer.Shader.uniforms['iTimeDelta'].value = deltaTime;
            buffer.Shader.uniforms['iTime'].value = time;
            buffer.Shader.uniforms['iFrame'].value = frameCounter;
            buffer.Shader.uniforms['iMouse'].value = mouse;
            buffer.Shader.uniforms['iMouseButton'].value = mouseButton;

            buffer.Shader.uniforms['iViewMatrix'].value = controlState.matrixWorld;

            buffer.Shader.uniforms['resolution'].value = resolution;
            buffer.Shader.uniforms['time'].value = time;
            buffer.Shader.uniforms['mouse'].value = normalizedMouse;

            quad.material = buffer.Shader;
            renderer.setRenderTarget(buffer.Target);
            renderer.render(scene, camera);
        }
        
        // Uniforms Update

        // Keyboard Update

        if (mouse.w > 0.0) {
            mouse.w = -mouse.w;
            updateMouse();
        }

        for (let buffer of buffers) {
            if (buffer.PingPongTarget) {
                [buffer.PingPongTarget, buffer.Target] = [buffer.Target, buffer.PingPongTarget];
                buffer.Shader.uniforms[`iChannel${buffer.PingPongChannel}`].value = buffer.PingPongTarget.texture;
                for (let dependent of buffer.Dependents) {
                    const dependentBuffer = buffers[dependent.Index];
                    dependentBuffer.Shader.uniforms[`iChannel${dependent.Channel}`].value = buffer.Target.texture;
                }
            }
        }

        if (offlineRecording) {
            recorder.capture(canvas);
        }

        frameCounter++;
    }
    function forceAspectRatio(width, height) {
        // Forced aspect ratio
        let forcedAspects = [0,0];
        let forcedAspectRatio = forcedAspects[0] / forcedAspects[1];
        let aspectRatio = width / height;

        if (forcedAspectRatio <= 0 || !isFinite(forcedAspectRatio)) {
            let resolution = new THREE.Vector3(width, height, 1.0);
            return resolution;
        }
        else if (aspectRatio < forcedAspectRatio) {
            let resolution = new THREE.Vector3(width, Math.floor(width / forcedAspectRatio), 1);
            return resolution;
        }
        else {
            let resolution = new THREE.Vector3(Math.floor(height * forcedAspectRatio), height, 1);
            return resolution;
        }
    }
    function computeSize() {
        
        let forcedResolutions = [0,0];
        let zoom = forcedResolutions[0] > 0 ? 1.0/window.devicePixelRatio : 1.0;
        canvas.style.zoom = zoom;

        // Compute forced aspect ratio and align canvas
        resolution = forceAspectRatio(window.innerWidth, window.innerHeight);
        canvas.style.left = `${(window.innerWidth - resolution.x*zoom) / 2}px`;
        canvas.style.top = `${(window.innerHeight - resolution.y*zoom) / 2}px`;

        for (let buffer of buffers) {
            if (buffer.Target) {
                buffer.Target.setSize(resolution.x, resolution.y);
            }
            if (buffer.PingPongTarget) {
                buffer.PingPongTarget.setSize(resolution.x, resolution.y);
            }
        }
        renderer.setSize(resolution.x, resolution.y, false);
        
        // Update Camera and Mesh
        quad.geometry = new THREE.PlaneGeometry(resolution.x, resolution.y);
        camera.left = -resolution.x / 2.0;
        camera.right = resolution.x / 2.0;
        camera.top = resolution.y / 2.0;
        camera.bottom = -resolution.y / 2.0;
        camera.updateProjectionMatrix();

        // Reset iFrame on resize for shaders that rely on first-frame setups
        frameCounter = 0;
    }
    function saveScreenshot() {
        let doSaveScreenshot = () => {
            renderer.domElement.toBlob(function(blob){
                let a = document.createElement('a');
                let url = URL.createObjectURL(blob);
                a.href = url;
                a.download = 'shadertoy.png';
                a.click();
            }, 'image/png', 1.0);
        };

        let forcedScreenshotResolution = [0,0];
        if (forcedScreenshotResolution[0] <= 0 || forcedScreenshotResolution[1] <= 0) {
            renderer.render(scene, camera);
            doSaveScreenshot();
        }
        else {
            renderer.setSize(forcedScreenshotResolution[0], forcedScreenshotResolution[1], false);
            
            for (let buffer of buffers) {
                buffer.Shader.uniforms['iResolution'].value = new THREE.Vector3(forcedScreenshotResolution[0], forcedScreenshotResolution[1], 1);
                buffer.Shader.uniforms['resolution'].value = new THREE.Vector3(forcedScreenshotResolution[0], forcedScreenshotResolution[1], 1);

                quad.material = buffer.Shader;
                renderer.setRenderTarget(buffer.Target);
                renderer.render(scene, camera);
            }

            doSaveScreenshot();
            renderer.setSize(resolution.x, resolution.y, false);
        }
    }
    function recordAction() {
        if (typeof CCapture !== 'undefined') {
            recordCCapture();
        } else {
            recordMediaRecorder();
        }
    }
    function recordCCapture() {
        let maxDuration = 0;
        let targetFrameRate = 30;
        let format = "webm";
        let quality = 80;
        let extension = format == "png" || format == "jpg" ? "tar" : format;

        let recordButton = document.getElementById("record");
        if (recorder == null) {
            recordButton.classList.add('recording');

            offlineRecording = true;
            recorder = new CCapture( {
                format: format,
                quality: quality,
                timeLimit: maxDuration,
                framerate: targetFrameRate,
            } );
            recorder.start();
        }
        else {
            recordButton.classList.remove('recording');

            recorder.stop();
            recorder.save((blob) => {
                let a = document.createElement('a');
                let url = URL.createObjectURL(blob);
                a.href = url;
                a.download = `shadertoy.${extension}`;
                a.click();
            } );
            recorder = null;
            offlineRecording = false;
        }
    }
    function recordMediaRecorder() {
        let recordButton = document.getElementById("record");
        if (recordingTimeout != null) {
            clearTimeout(recordingTimeout);
            recordingTimeout = null;
        }
        if (recorder == null) {
            recordButton.classList.add('recording');

            let videoContainer = "webm";
            let videoCodec = "vp8";
            let maxDuration = 0;
            let targetFrameRate = 30;

            let stream = canvas.captureStream(targetFrameRate);
            let recorderOptions = {
                videoBitsPerSecond: 2500000,
                mimeType: `video/${videoContainer};codecs=${videoCodec}`
            };
            recorder = new MediaRecorder(stream, recorderOptions);
            recorder.start();
            recorder.ondataavailable = function(evt) {
                let a = document.createElement('a');
                let url = URL.createObjectURL(evt.data);
                a.href = url;
                a.download = `shadertoy.${videoContainer}`;
                a.click();
            };

            if (maxDuration > 0) {
                recordingTimeout = setTimeout(() => {
                    recordButton.classList.remove('recording');
                    recorder.stop();
                    recorder = null;
                    recordingTimeout = null;
                }, maxDuration*1000);
            }
        }
        else {
            recordButton.classList.remove('recording');

            recorder.stop();
            recorder = null;
        }
    }
    function reloadWebview() {
        if (vscode !== undefined) {
            vscode.postMessage({ command: 'reloadWebview' });
        }
    }
    function updateMouse() {
        if (vscode !== undefined) {
            vscode.postMessage({
                command: 'updateMouse',
                mouse: {
                    x: mouse.x,
                    y: mouse.y,
                    z: mouse.z,
                    w: mouse.w
                },
                normalizedMouse: {
                    x: normalizedMouse.x,
                    y: normalizedMouse.y
                }
            });
        }
    }
    let dragging = false;
    function updateNormalizedMouseCoordinates(clientX, clientY) {
        let rect = canvas.getBoundingClientRect();
        let mouseX = clientX - rect.left;
        let mouseY = resolution.y - clientY - rect.top;

        if (mouseButton.x + mouseButton.y != 0) {
            mouse.x = mouseX;
            mouse.y = mouseY;
        }

        normalizedMouse.x = mouseX / resolution.x;
        normalizedMouse.y = mouseY / resolution.y;
    }
    canvas.addEventListener('mousemove', function(evt) {
        updateNormalizedMouseCoordinates(evt.clientX, evt.clientY);
        updateMouse();
    }, false);
    canvas.addEventListener('mousedown', function(evt) {
        if (evt.button == 0)
            mouseButton.x = 1;
        if (evt.button == 2)
            mouseButton.y = 1;

        if (!dragging) {
            updateNormalizedMouseCoordinates(evt.clientX, evt.clientY);
            mouse.z = mouse.x;
            mouse.w = mouse.y;
            dragging = true
        }

        updateMouse();
    }, false);
    canvas.addEventListener('mouseup', function(evt) {
        if (evt.button == 0)
            mouseButton.x = 0;
        if (evt.button == 2)
            mouseButton.y = 0;

        dragging = false;
        mouse.z = -mouse.z;
        mouse.w = -mouse.w;

        updateMouse();
    }, false);
    window.addEventListener('resize', function() {
        computeSize();
    });

    // Keyboard Callbacks
</script>
